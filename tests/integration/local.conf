[[local|localrc]]
ADMIN_PASSWORD=secret
DATABASE_PASSWORD=secret
RABBIT_PASSWORD=secret
SERVICE_PASSWORD=secret

# ── Services ──────────────────────────────────────────────────────────────────
# Only bring up what snapshot-cli needs: Keystone + Cinder + Manila.
# Nova, Neutron, Glance, Swift are all disabled to keep startup time low.
disable_all_services
enable_service mysql rabbit keystone

# Cinder (block storage) – built into DevStack core
enable_service cinder c-api c-vol c-sch c-bak

# Manila (shared filesystem) – external plugin
enable_plugin manila https://opendev.org/openstack/manila master
enable_service manila m-api m-sch m-shr m-dat

# ── Cinder backend ────────────────────────────────────────────────────────────
# Loopback-backed LVM: no real block device required; DevStack creates a sparse
# file and attaches it as a loop device automatically.
VOLUME_BACKING_FILE_SIZE=10280M

# ── Manila backend ────────────────────────────────────────────────────────────
# LVM NFS driver with driver_handles_share_servers=False, so no Nova service
# VM is needed. DevStack creates a loopback-backed LVM VG for the shares.
MANILA_ENABLED_SHARE_PROTOCOLS=NFS
MANILA_DRIVER=lvm
SHARE_BACKING_FILE_SIZE=8280M
MANILA_LVM_SHARE_EXPORT_IP=127.0.0.1

# ── Logging ───────────────────────────────────────────────────────────────────
LOGFILE=$DEST/logs/stack.sh.log
LOGDAYS=1
VERBOSE=False
