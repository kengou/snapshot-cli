{{- if .Values.openstack.createSecret }}
{{- if not .Values.openstack.credentials }}
{{- fail "openstack.createSecret=true requires non-empty openstack.credentials (OS_AUTH_URL, OS_USERNAME, ...)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.openstack.secretName }}
  labels:
    {{- include "snapshot-cli.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.openstack.credentials }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
