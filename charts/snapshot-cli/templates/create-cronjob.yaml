{{- if .Values.create.schedule }}
{{- range .Values.create.args }}
{{- if contains "PLACEHOLDER" . }}
{{- fail "create.args still contains placeholder values — set --share-id, --name and --description before enabling create.schedule" }}
{{- end }}
{{- end }}
apiVersion: batch/v1
kind: CronJob
metadata:
  # CronJob names are limited to 52 characters (spawned Jobs get an 11-char
  # timestamp suffix), so the fullname budget is trimmed to fit.
  name: {{ printf "%s-create" (include "snapshot-cli.fullname" . | trunc 44 | trimSuffix "-") }}
  labels:
    {{- include "snapshot-cli.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.create.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy }}
  startingDeadlineSeconds: {{ .Values.cronJob.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cronJob.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "snapshot-cli.selectorLabels" . | nindent 12 }}
        spec:
          # The CLI only talks to OpenStack, never to the Kubernetes API.
          automountServiceAccountToken: false
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: {{ .Chart.Name }}-create
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                {{- toYaml .Values.create.args | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              envFrom:
                - secretRef:
                    name: {{ .Values.openstack.secretName }}
          restartPolicy: OnFailure
{{- end }}
