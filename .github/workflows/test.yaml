name: "Test and Build"
on:
  push:
    branches:
      - main
  # No paths filter: the suite runs in seconds, and unfiltered runs keep
  # required checks from wedging on docs-only PRs.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# All jobs use harden-runner in block mode. The allowlist covers GitHub
# (checkout, action/toolchain downloads) and the Go module proxy; if a job
# starts failing on a blocked call, the harden-runner annotation names the
# endpoint to add.
jobs:
  lint:
    runs-on: [ ubuntu-latest ]
    timeout-minutes: 15
    steps:
      - name: Harden the runner (block all unexpected outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            dl.google.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
      - name: golangci-lint
        run: make lint

  test:
    runs-on: [ubuntu-latest]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden the runner (block all unexpected outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            dl.google.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'

      # ── Unit and E2E tests ────────────────────────────────────────────────────
      # E2E tests mock the OpenStack APIs via httptest.Server, so they run in
      # ~3 seconds without any external dependencies. Linting runs in its own
      # job — not repeated here.
      - name: Run tests
        run: make test

  build:
    runs-on: [ubuntu-latest]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden the runner (block all unexpected outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            dl.google.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: make build
