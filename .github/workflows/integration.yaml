name: "Integration tests"
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'tests/integration/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  integration:
    runs-on: [ ubuntu-latest ]
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'

      # ── DevStack ─────────────────────────────────────────────────────────────
      # DevStack is the standard OpenStack developer environment used by all
      # upstream projects (including gophercloud) for integration testing.
      # It runs natively on ubuntu-latest GitHub-hosted runners.
      - name: Install DevStack prerequisites
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q git python3-pip python3-venv

      - name: Clone DevStack
        run: git clone --depth 1 https://opendev.org/openstack/devstack /opt/devstack

      - name: Copy local.conf
        run: cp tests/integration/local.conf /opt/devstack/local.conf

      - name: Create stack user
        run: |
          sudo /opt/devstack/tools/create-stack-user.sh
          sudo chown -R stack:stack /opt/devstack

      - name: Run DevStack
        timeout-minutes: 30
        run: |
          sudo -u stack -i bash -c "cd /opt/devstack && ./stack.sh"

      # ── Export OpenStack credentials ──────────────────────────────────────────
      # DevStack writes openrc to /opt/devstack/openrc. Source it and forward
      # the OS_* variables to GITHUB_ENV so subsequent steps inherit them.
      - name: Export OpenStack credentials
        run: |
          # shellcheck disable=SC1091
          source /opt/devstack/openrc admin admin
          printenv | grep '^OS_' >> "$GITHUB_ENV"

      # ── Integration tests ─────────────────────────────────────────────────────
      - name: Run integration tests
        run: |
          go test ./tests/integration/... \
            -tags integration \
            -v \
            -timeout 20m

      # ── Lint (must pass after every code change) ──────────────────────────────
      - name: golangci-lint
        run: make lint
